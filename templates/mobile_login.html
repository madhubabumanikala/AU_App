<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Login - AU Event System</title>
    
    <!-- Bootstrap 5 Mobile Optimized -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Mobile App Styles -->
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #6c757d;
            --success-color: #198754;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --info-color: #0dcaf0;
            --light-color: #f8f9fa;
            --dark-color: #212529;
            --mobile-primary: #4361ee;
            --mobile-secondary: #6c757d;
            --mobile-background: #ffffff;
            --mobile-surface: #f8f9fa;
            --mobile-border: #dee2e6;
            --mobile-text: #212529;
            --mobile-text-secondary: #6c757d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--mobile-text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Mobile App Container */
        .mobile-app {
            max-width: 428px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--mobile-background);
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Mobile Header */
        .mobile-header {
            background: var(--mobile-primary);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .mobile-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .mobile-header .subtitle {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* Login Container */
        .login-container {
            padding: 40px 20px;
            min-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Mobile Cards */
        .mobile-card {
            background: var(--mobile-surface);
            border-radius: 20px;
            padding: 30px 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border: 1px solid var(--mobile-border);
        }

        .mobile-card h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--mobile-text);
            text-align: center;
        }

        /* Mobile Form Elements */
        .form-floating {
            margin-bottom: 20px;
        }

        .form-control {
            border: 2px solid var(--mobile-border);
            border-radius: 15px;
            padding: 15px;
            font-size: 16px;
            background: var(--mobile-background);
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--mobile-primary);
            box-shadow: 0 0 0 0.2rem rgba(67, 97, 238, 0.25);
        }

        .form-select {
            border: 2px solid var(--mobile-border);
            border-radius: 15px;
            padding: 15px;
            font-size: 16px;
            background: var(--mobile-background);
        }

        /* Radio Buttons */
        .radio-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            background: var(--mobile-background);
            padding: 15px;
            border-radius: 15px;
            border: 2px solid var(--mobile-border);
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .radio-label {
            display: block;
            padding: 15px;
            text-align: center;
            border-radius: 12px;
            border: 2px solid var(--mobile-border);
            background: var(--mobile-background);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .radio-option input[type="radio"]:checked + .radio-label {
            background: var(--mobile-primary);
            color: white;
            border-color: var(--mobile-primary);
        }

        .radio-label i {
            display: block;
            font-size: 20px;
            margin-bottom: 5px;
        }

        /* Mobile Buttons */
        .mobile-btn {
            background: var(--mobile-primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .mobile-btn:hover {
            background: #3651de;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.3);
        }

        .mobile-btn:active {
            transform: translateY(0);
        }

        .mobile-btn-secondary {
            background: var(--mobile-secondary);
        }

        .mobile-btn-secondary:hover {
            background: #5c636a;
        }

        /* Checkbox */
        .form-check {
            margin-bottom: 20px;
        }

        .form-check-input {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            border: 2px solid var(--mobile-border);
        }

        .form-check-label {
            font-size: 14px;
            color: var(--mobile-text-secondary);
        }

        /* Alert Messages */
        .mobile-alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .mobile-alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .mobile-alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .mobile-alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        /* Quick Links */
        .quick-links {
            text-align: center;
            margin-top: 20px;
        }

        .quick-links a {
            color: var(--mobile-primary);
            text-decoration: none;
            font-size: 14px;
            margin: 0 10px;
        }

        .quick-links a:hover {
            text-decoration: underline;
        }

        /* Loading Spinner */
        .mobile-spinner {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .mobile-spinner .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid var(--mobile-border);
            border-top: 3px solid var(--mobile-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .mobile-app {
                max-width: 100%;
                box-shadow: none;
            }
        }

        @media (min-width: 769px) {
            .mobile-app {
                margin: 20px auto;
                border-radius: 20px;
                overflow: hidden;
            }
        }
    </style>
</head>
<body>
    <div class="mobile-app">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <h1>
                <i class="fas fa-calendar-alt me-2"></i>
                AU Events
            </h1>
            <div class="subtitle">
                Andhra University Event Management System
            </div>
        </header>

        <!-- Login Container -->
        <div class="login-container">
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mobile-alert mobile-alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- Login Form -->
            <div class="mobile-card">
                <h3>
                    <i class="fas fa-sign-in-alt me-2"></i>
                    Login
                </h3>
                
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <!-- User Type Selection -->
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="student" name="user_type" value="student" checked>
                            <label for="student" class="radio-label">
                                <i class="fas fa-user-graduate"></i>
                                Student
                            </label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="admin" name="user_type" value="admin">
                            <label for="admin" class="radio-label">
                                <i class="fas fa-user-shield"></i>
                                Admin
                            </label>
                        </div>
                    </div>

                    <!-- Email Field -->
                    <div class="form-floating">
                        <input type="email" 
                               class="form-control" 
                               id="email" 
                               name="email" 
                               placeholder="Email Address" 
                               required
                               value="{{ request.form.email or '' }}">
                        <label for="email">Email Address</label>
                    </div>

                    <!-- Password Field -->
                    <div class="form-floating">
                        <input type="password" 
                               class="form-control" 
                               id="password" 
                               name="password" 
                               placeholder="Password" 
                               required>
                        <label for="password">Password</label>
                    </div>

                    <!-- Remember Me -->
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember_me">
                        <label class="form-check-label" for="remember">
                            Remember me
                        </label>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="mobile-btn">
                        <i class="fas fa-sign-in-alt me-2"></i>
                        Login
                    </button>
                </form>
            </div>

            <!-- Quick Links -->
            <div class="quick-links">
                <a href="{{ url_for('auth.student_register') }}">
                    <i class="fas fa-user-plus me-1"></i>
                    Register
                </a>
                <a href="#" onclick="showHelp()">
                    <i class="fas fa-question-circle me-1"></i>
                    Help
                </a>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Mobile App Initialization
        document.addEventListener('DOMContentLoaded', function() {
            // Add touch-friendly interactions
            const buttons = document.querySelectorAll('.mobile-btn');
            buttons.forEach(button => {
                button.addEventListener('touchstart', function() {
                    this.style.transform = 'scale(0.95)';
                });
                button.addEventListener('touchend', function() {
                    this.style.transform = 'scale(1)';
                });
            });

            // Auto-focus email field
            document.getElementById('email').focus();
        });

        // Show help function
        function showHelp() {
            alert('Default Credentials:\n\nStudent:\nEmail: john.cs001@andhrauniversity.edu.in\nPassword: password123\n\nAdmin:\nEmail: admin@au-events.com\nPassword: admin123');
        }

        // Form validation
        document.querySelector('form').addEventListener('submit', function(e) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                e.preventDefault();
                alert('Please fill in all fields');
                return false;
            }
            
            // Show loading state
            const submitBtn = document.querySelector('.mobile-btn[type="submit"]');
            submitBtn.innerHTML = '<div class="mobile-spinner"><div class="spinner"></div></div>';
            submitBtn.disabled = true;
        });

        // Password visibility toggle (optional enhancement)
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const type = passwordField.type === 'password' ? 'text' : 'password';
            passwordField.type = type;
        }
    </script>
</body>
</html>
