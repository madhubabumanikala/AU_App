{% extends "base.html" %}

{% block title %}Edit Profile - AU Event System{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-user-edit me-2"></i>Edit Profile
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="first_name" class="form-label">First Name</label>
                                <input type="text" class="form-control" id="first_name" name="first_name" 
                                       value="{{ current_user.first_name }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="last_name" class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="last_name" name="last_name" 
                                       value="{{ current_user.last_name }}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" 
                                   value="{{ current_user.email }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="phone_number" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="phone_number" name="phone_number" 
                                   value="{{ current_user.phone_number or '' }}">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="department" class="form-label">Department</label>
                                <select class="form-select" id="department" name="department" required>
                                    <option value="">Select Department</option>
                                    <option value="Computer Science" {% if current_user.department == 'Computer Science' %}selected{% endif %}>Computer Science</option>
                                    <option value="Electronics" {% if current_user.department == 'Electronics' %}selected{% endif %}>Electronics</option>
                                    <option value="Mechanical" {% if current_user.department == 'Mechanical' %}selected{% endif %}>Mechanical</option>
                                    <option value="Civil" {% if current_user.department == 'Civil' %}selected{% endif %}>Civil</option>
                                    <option value="Chemical" {% if current_user.department == 'Chemical' %}selected{% endif %}>Chemical</option>
                                    <option value="Electrical" {% if current_user.department == 'Electrical' %}selected{% endif %}>Electrical</option>
                                    <option value="IT" {% if current_user.department == 'IT' %}selected{% endif %}>Information Technology</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="year" class="form-label">Year</label>
                                <select class="form-select" id="year" name="year" required>
                                    <option value="">Select Year</option>
                                    <option value="1" {% if current_user.year == 1 %}selected{% endif %}>1st Year</option>
                                    <option value="2" {% if current_user.year == 2 %}selected{% endif %}>2nd Year</option>
                                    <option value="3" {% if current_user.year == 3 %}selected{% endif %}>3rd Year</option>
                                    <option value="4" {% if current_user.year == 4 %}selected{% endif %}>4th Year</option>
                                </select>
                            </div>
                        </div>

                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            <strong>Note:</strong> Student ID cannot be changed. Contact admin if correction is needed.
                        </div>

                        <hr>
                        
                        <h6 class="mb-3">Change Password (Optional)</h6>
                        
                        <div class="mb-3">
                            <label for="current_password" class="form-label">Current Password</label>
                            <input type="password" class="form-control" id="current_password" name="current_password">
                            <div class="form-text">Leave empty if you don't want to change password</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="new_password" class="form-label">New Password</label>
                                <input type="password" class="form-control" id="new_password" name="new_password">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="confirm_password" class="form-label">Confirm New Password</label>
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password">
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('auth.profile') }}" class="btn btn-secondary me-md-2">
                                <i class="fas fa-times me-1"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>Update Profile
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('current_password').addEventListener('input', function() {
    const currentPassword = this.value;
    const newPassword = document.getElementById('new_password');
    const confirmPassword = document.getElementById('confirm_password');
    
    if (currentPassword) {
        newPassword.required = true;
        confirmPassword.required = true;
    } else {
        newPassword.required = false;
        confirmPassword.required = false;
        newPassword.value = '';
        confirmPassword.value = '';
    }
});

document.getElementById('new_password').addEventListener('input', function() {
    const currentPassword = document.getElementById('current_password');
    if (this.value) {
        currentPassword.required = true;
    }
});
</script>
{% endblock %}
